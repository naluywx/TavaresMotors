<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Honda Sahara 300 | Tavares Motors</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

.gallery-side{
position:relative;
}

.arrow{
position:absolute;

top:50%;

transform:translateY(-50%);

width:50px;
height:50px;

border:none;

background:rgba(0,0,0,0.6);

color:white;

font-size:30px;

cursor:pointer;

z-index:10;
}

.left{
left:10px;
}

.right{
right:10px;
}

</style>

</head>

<body>

<!-- HEADER -->

<header class="header">

<img src="assets/logo.png" class="logo">

<nav>

<a href="index.html">INÍCIO</a>
<a href="estoque.html">ESTOQUE</a>
<a href="financiamento.html">FINANCIAMENTO</a>
<a href="contato.html">CONTATO</a>

</nav>

</header>

<!-- PÁGINA DA MOTO -->

<section class="moto-page">

<!-- GALERIA -->

<div class="gallery-side">

<button class="arrow left" onclick="prevImage()">
❮
</button>

<img
src="assets/motos/ADV/1.jpeg"
class="main-image"
id="mainImage">

<button class="arrow right" onclick="nextImage()">
❯
</button>

<div class="thumbs">

<img
src="assets/motos/ADV/1.jpeg"
onclick="changeImage(this)">

<img
src="assets/motos/ADV/2.jpeg"
onclick="changeImage(this)">

<img
src="assets/motos/ADV/3.jpeg"
onclick="changeImage(this)">

</div>

</div>

<!-- INFO -->

<div class="info-side">

<small>HONDA</small>

<h1>
ADV Vermelha
</h1>

<h2 class="moto-price">
R$ 23.900
</h2>

<p class="description">

Moto impecável, revisada,
com excelente procedência
e pronta para rodar.

</p>

<!-- GRID -->

<div class="details-grid">

<div class="detail-box">

<span>Ano</span>

<h3>2023</h3>

</div>

<div class="detail-box">

<span>Quilometragem</span>

<h3>13.300 KM</h3>

</div>

<div class="detail-box">

<span>Cor</span>

<h3>Vermelho</h3>

</div>

</div>

<!-- BOTÕES -->

<div class="buttons-moto">

<a
href="https://wa.me/5511993850833"
target="_blank"
class="gold-btn">

WHATSAPP

</a>

<a
href="tel:11993850833"
class="outline-btn">

LIGAR AGORA

</a>

</div>

<!-- GARANTIA -->

<div class="garantia-box">

<h3>
Garantia de 1 Ano
</h3>

<p>
Motor e câmbio com garantia.
</p>

</div>

</div>

</section>

<script>

const images = [

"assets/motos/Adv/1.jpeg",
"assets/motos/ADV/2.jpeg",
"assets/motos/ADV/3.jpeg"

];

let current = 0;

const mainImage =
document.getElementById("mainImage");

function nextImage(){

current++;

if(current >= images.length){
current = 0;
}

mainImage.src = images[current];

}

function prevImage(){

current--;

if(current < 0){
current = images.length - 1;
}

mainImage.src = images[current];

}

function changeImage(img){

mainImage.src = img.src;

}

</script>

<script src="script.js"></script>

</body>
</html>
